<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Core Brand Colors & Gradients -->
    <linearGradient id="glowGrad" gradientUnits="userSpaceOnUse" x1="400" y1="85" x2="400" y2="435">
      <stop offset="0%" stop-color="#FF9E46" stop-opacity="1" />
      <stop offset="100%" stop-color="#FF6A00" stop-opacity="1" />
    </linearGradient>
    
    <!-- Subtle Glow Filter for Real-time Glow Effect -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .bg { fill: #0D0D0C; }
    .grid-lines { stroke: #1A1A18; stroke-width: 1; opacity: 0.4; }
    .logo-text { font-family: 'Inter', 'SF Pro Display', -apple-system, sans-serif; font-weight: 700; fill: #FFFFFF; letter-spacing: -0.03em; }
    .brand-orange { fill: url(#glowGrad); filter: url(#neonGlow); }
    .mesh-line { stroke: #FF9E46; stroke-width: 1.5; opacity: 0.4; stroke-dasharray: 1000; }
    .accent-glow { stroke: url(#glowGrad); filter: url(#neonGlow); }
  </style>

  <!-- Dark Background Canvas -->
  <rect width="100%" height="100%" class="bg" />

  <!-- Technical Grid Subtle Backdrop -->
  <g class="grid-lines">
    <path d="M 0,100 L 800,100 M 0,200 L 800,200 M 0,300 L 800,300 M 0,400 L 800,400" />
    <path d="M 100,0 L 100,500 M 200,0 L 200,500 M 300,0 L 300,500 M 400,0 L 400,500 M 500,0 L 500,500 M 600,0 L 600,500 M 700,0 L 700,500" />
  </g>

  <!-- Primary Logo Mark (Centered System Node) -->
  <g transform="translate(400, 190)">
    <!-- Intersecting Network Mesh Lines -->
    <line x1="0" y1="70" x2="-80" y2="-60" class="mesh-line" />
    <line x1="0" y1="70" x2="80" y2="-60" class="mesh-line" />
    <line x1="0" y1="-30" x2="-80" y2="-60" class="mesh-line" />
    <line x1="0" y1="-30" x2="80" y2="-60" class="mesh-line" />
    <line x1="-40" y1="5" x2="0" y2="-100" class="mesh-line" />
    <line x1="40" y1="5" x2="0" y2="-100" class="mesh-line" />
    
    <!-- Outer Chevron Outer Wings (V-Shape Structure) -->
    <path d="M -80,-60 L 0,70 L 80,-60" fill="none" stroke="url(#glowGrad)" stroke-width="3" opacity="0.7" />
    
    <!-- Central Action Pillar (Stability Column) -->
    <line x1="0" y1="65" x2="0" y2="-90" class="accent-glow" stroke-width="6" stroke-linecap="round" />
    
    <!-- Upward Growth Arrowhead (Maintenance / Scale) -->
    <path d="M -20,-80 L 0,-105 L 20,-80" fill="none" class="accent-glow" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Connected Data Nodes (Dots) -->
    <circle cx="0" cy="65" r="7" class="brand-orange" />
    <circle cx="0" cy="-30" r="5" class="brand-orange" />
    <circle cx="-40" cy="5" r="4" class="brand-orange" />
    <circle cx="40" cy="5" r="4" class="brand-orange" />
    <circle cx="-80" cy="-60" r="4" class="brand-orange" />
    <circle cx="80" cy="-60" r="4" class="brand-orange" />
  </g>

  <!-- Typography Wordmark Lockup -->
  <g id="wordmark">
    <text x="400" y="380" font-size="64" text-anchor="middle" class="logo-text">
      vibe <tspan fill="url(#glowGrad)">11</tspan>
    </text>
    <text x="400" y="415" font-size="14" font-weight="500" letter-spacing="0.4em" fill="#8F8F8A" text-anchor="middle" opacity="0.8">
      AUTONOMOUS SYSTEMS OF ACTION
    </text>
  </g>
</svg>
